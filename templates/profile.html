{% extends "base.html" %}

{% block content %}
<main class="mt-6 pb-12 max-w-xl mx-auto">
    <div class="mb-8">
        <p class="text-on-surface-variant font-headline font-semibold text-sm uppercase tracking-widest mb-1">AI Coach</p>
        <h2 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface">PROFIL ATLETA</h2>
        <p class="text-sm text-on-surface-variant mt-2">Tieto údaje AI coach používa pri každej odpovedi — čím viac vyplníš, tým presnejší advice dostaneš.</p>
    </div>

    <form method="POST" class="bg-surface-container-high rounded-3xl p-6 space-y-5">

        <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Meno / prezývka</label>
            <input type="text" name="name" value="{{ p.name or '' }}" placeholder="napr. Tomáš" maxlength="100">
        </div>

        <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Vek</label>
            <input type="number" name="age" value="{{ p.age or '' }}" placeholder="napr. 17" min="10" max="80">
        </div>

        <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Hlavná disciplína</label>
            <select name="sport">
                <option value="">— vyber —</option>
                {% for opt in ['400m šprint', '200m šprint', '100m šprint', '800m beh', '1500m beh', '5km beh', '10km beh', 'Polmaratón', 'Maratón', 'Plávanie', 'Cyklistika', 'Triatlon'] %}
                <option value="{{ opt }}" {% if p and p.sport == opt %}selected{% endif %}>{{ opt }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Cieľ / cieľový čas</label>
            <input type="text" name="goal" value="{{ p.goal or '' }}" placeholder="napr. sub-50s na 400m do konca sezóny" maxlength="200">
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="flex-1 bg-primary hover:opacity-90 text-white font-bold py-3 rounded-2xl transition-opacity">
                Uložiť profil
            </button>
            <a href="{{ url_for('ai_portal') }}"
                class="px-5 py-3 rounded-2xl border border-white/10 text-on-surface-variant hover:text-on-surface hover:border-white/20 font-bold transition-colors text-center">
                Späť
            </a>
        </div>
    </form>
</main>
{% endblock %}
